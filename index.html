<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- PWA設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="投資管理">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#378ADD">
  
  <title>投資ポートフォリオ管理</title>
  
  <!-- アイコン設定 -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="app-icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="app-icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="app-icon-512.png">
  
  <style>
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f7f6f3;
      --color-background-tertiary: #f1efe8;
      --color-background-info: #e6f1fb;
      --color-background-danger: #fcebeb;
      --color-background-success: #eaf3de;
      --color-background-warning: #faeeda;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666666;
      --color-text-tertiary: #999999;
      --color-text-info: #185fa5;
      --color-text-danger: #a32d2d;
      --color-text-success: #3b6d11;
      --color-text-warning: #854f0b;
      --color-border-tertiary: rgba(0, 0, 0, 0.15);
      --color-border-secondary: rgba(0, 0, 0, 0.3);
      --color-border-primary: rgba(0, 0, 0, 0.4);
      --color-border-info: #b5d4f4;
      --color-border-danger: #f7c1c1;
      --color-border-success: #c0dd97;
      --color-border-warning: #fac775;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --border-radius-xl: 16px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1a1a1a;
        --color-background-secondary: #2a2a2a;
        --color-background-tertiary: #333333;
        --color-background-info: #0c447c;
        --color-background-danger: #791f1f;
        --color-background-success: #27500a;
        --color-background-warning: #633806;
        --color-text-primary: #ffffff;
        --color-text-secondary: #b3b3b3;
        --color-text-tertiary: #808080;
        --color-text-info: #b5d4f4;
        --color-text-danger: #f7c1c1;
        --color-text-success: #c0dd97;
        --color-text-warning: #fac775;
        --color-border-tertiary: rgba(255, 255, 255, 0.15);
        --color-border-secondary: rgba(255, 255, 255, 0.3);
        --color-border-primary: rgba(255, 255, 255, 0.4);
        --color-border-info: #185fa5;
        --color-border-danger: #a32d2d;
        --color-border-success: #3b6d11;
        --color-border-warning: #854f0b;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: var(--font-sans); 
      color: var(--color-text-primary); 
      background: var(--color-background-tertiary);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      max-width: 480px;
      margin: 0 auto;
    }
    .container { padding: 16px; }
    .tab-nav { 
      display: flex; 
      border-bottom: 0.5px solid var(--color-border-tertiary); 
      margin-bottom: 1.5rem; 
      background: var(--color-background-primary);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .tab-btn { 
      flex: 1; 
      padding: 12px; 
      background: none; 
      border: none; 
      font-size: 14px; 
      font-weight: 500; 
      color: var(--color-text-secondary); 
      cursor: pointer; 
      border-bottom: 2px solid transparent; 
      transition: all 0.2s; 
    }
    .tab-btn.active { color: var(--color-text-primary); border-bottom-color: var(--color-text-info); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .section { margin-bottom: 1.5rem; }
    .section-title { font-size: 16px; font-weight: 500; margin-bottom: 12px; }
    .card { 
      background: var(--color-background-primary); 
      border: 0.5px solid var(--color-border-tertiary); 
      border-radius: var(--border-radius-lg); 
      padding: 1rem; 
      margin-bottom: 12px; 
    }
    .metric-card { 
      background: var(--color-background-secondary); 
      border-radius: var(--border-radius-md); 
      padding: 1rem; 
    }
    .metric-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px; }
    .metric-value { font-size: 24px; font-weight: 500; }
    .metric-sub { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .input-row label { flex: 1; font-size: 14px; color: var(--color-text-secondary); }
    .input-row input, .input-row select { width: 140px; }
    input[type="text"], input[type="number"], select, textarea { 
      font-size: 14px; 
      padding: 8px 12px; 
      border: 0.5px solid var(--color-border-tertiary); 
      border-radius: var(--border-radius-md); 
      background: var(--color-background-primary); 
      color: var(--color-text-primary); 
    }
    textarea { width: 100%; min-height: 80px; resize: vertical; font-family: var(--font-sans); }
    button { 
      padding: 10px 16px; 
      border: 0.5px solid var(--color-border-secondary); 
      border-radius: var(--border-radius-md); 
      background: transparent; 
      color: var(--color-text-primary); 
      font-size: 14px; 
      font-weight: 500; 
      cursor: pointer; 
      transition: all 0.2s; 
    }
    button:hover { background: var(--color-background-secondary); }
    button:active { transform: scale(0.98); }
    button.primary { 
      background: var(--color-background-info); 
      color: var(--color-text-info); 
      border-color: var(--color-border-info); 
    }
    button.danger { 
      background: var(--color-background-danger); 
      color: var(--color-text-danger); 
      border-color: var(--color-border-danger); 
    }
    .item-card { 
      background: var(--color-background-primary); 
      border: 0.5px solid var(--color-border-tertiary); 
      border-radius: var(--border-radius-md); 
      padding: 12px; 
      margin-bottom: 8px; 
    }
    .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .item-name { font-weight: 500; font-size: 14px; }
    .item-remove { padding: 4px 8px; font-size: 12px; }
    .history-item { 
      border-left: 2px solid var(--color-border-info); 
      padding-left: 12px; 
      margin-bottom: 16px; 
      cursor: pointer; 
      transition: all 0.2s; 
    }
    .history-item:hover { border-left-color: var(--color-text-info); }
    .history-date { font-weight: 500; font-size: 14px; margin-bottom: 4px; }
    .history-total { font-size: 13px; color: var(--color-text-secondary); }
    .chart-container { position: relative; width: 100%; height: 260px; margin-top: 16px; }
    .goal-input { width: 60px !important; }
    .date-selector { 
      background: var(--color-background-secondary); 
      border-radius: var(--border-radius-md); 
      padding: 12px; 
      margin-bottom: 1rem;
    }
    .date-selector-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('current')">記録</button>
      <button class="tab-btn" onclick="switchTab('history')">推移</button>
      <button class="tab-btn" onclick="switchTab('settings')">設定</button>
    </div>

    <div id="tab-current" class="tab-content active">
      <div class="date-selector">
        <div class="date-selector-label">記録月</div>
        <div style="display: flex; gap: 8px; align-items: center;">
          <input type="number" id="record-year" min="2000" max="2100" style="width: 80px;">
          <span style="font-size: 14px;">年</span>
          <input type="number" id="record-month" min="1" max="12" style="width: 60px;">
          <span style="font-size: 14px;">月</span>
        </div>
      </div>

      <div class="section">
        <div class="grid-2">
          <div class="metric-card">
            <div class="metric-label">総資産</div>
            <div class="metric-value" id="total-assets">¥0</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">評価損益</div>
            <div class="metric-value" id="total-pl">¥0</div>
            <div class="metric-sub" id="total-pl-pct">0%</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">カテゴリー別</div>
        <div id="category-items">
          <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
              <div style="font-weight: 500;">💰 現金</div>
              <button onclick="addItem('cash')" style="padding: 6px 12px; font-size: 13px;">+ 追加</button>
            </div>
            <div id="items-cash"></div>
          </div>
          
          <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
              <div style="font-weight: 500;">📊 NISA（つみたて投資枠）</div>
              <button onclick="addItem('nisa-tsumitate')" style="padding: 6px 12px; font-size: 13px;">+ 追加</button>
            </div>
            <div id="items-nisa-tsumitate"></div>
          </div>
          
          <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
              <div style="font-weight: 500;">📈 NISA（成長投資枠）</div>
              <button onclick="addItem('nisa-growth')" style="padding: 6px 12px; font-size: 13px;">+ 追加</button>
            </div>
            <div id="items-nisa-growth"></div>
          </div>
          
          <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
              <div style="font-weight: 500;">📉 個別株</div>
              <button onclick="addItem('stock')" style="padding: 6px 12px; font-size: 13px;">+ 追加</button>
            </div>
            <div id="items-stock"></div>
          </div>
          
          <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
              <div style="font-weight: 500;">🏦 iDeCo</div>
              <button onclick="addItem('ideco')" style="padding: 6px 12px; font-size: 13px;">+ 追加</button>
            </div>
            <div id="items-ideco"></div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">メモ</div>
        <textarea id="memo-input" placeholder="今月の振り返りや気づきなどを記録..."></textarea>
      </div>

      <div class="section">
        <button class="primary" onclick="saveSnapshot()" style="width: 100%;">💾 今月のデータを保存</button>
      </div>
    </div>

    <div id="tab-history" class="tab-content">
      <div class="section">
        <div class="grid-2">
          <div class="metric-card">
            <div class="metric-label">前月比</div>
            <div class="metric-value" id="mom-change">-</div>
            <div class="metric-sub" id="mom-pct">-</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">記録回数</div>
            <div class="metric-value" id="record-count">0回</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">リスク区分別推移</div>
        <div class="chart-container">
          <canvas id="risk-chart"></canvas>
        </div>
      </div>

      <div class="section">
        <div class="section-title">総資産推移</div>
        <div class="chart-container">
          <canvas id="asset-chart"></canvas>
        </div>
      </div>

      <div class="section">
        <div class="section-title">カテゴリー別構成比</div>
        <div class="chart-container">
          <canvas id="category-chart"></canvas>
        </div>
      </div>

      <div class="section">
        <div class="section-title">記録履歴</div>
        <div id="history-list"></div>
      </div>
    </div>

    <div id="tab-settings" class="tab-content">
      <div class="section">
        <div class="section-title">リスク区分の目標比率</div>
        <div class="card">
          <div class="input-row">
            <label>現金</label>
            <input type="number" id="goal-cash" class="goal-input" min="0" max="100"> %
          </div>
          <div class="input-row">
            <label>分散投資</label>
            <input type="number" id="goal-diversified" class="goal-input" min="0" max="100"> %
          </div>
          <div class="input-row">
            <label>集中投資</label>
            <input type="number" id="goal-concentrated" class="goal-input" min="0" max="100"> %
          </div>
          <div style="margin-top: 12px; font-size: 13px; color: var(--color-text-secondary);">
            ※ 合計が100%になるように設定してください
          </div>
        </div>
        <button class="primary" onclick="saveGoals()" style="width: 100%; margin-top: 12px;">保存</button>
      </div>

      <div class="section">
        <div class="section-title">データ管理</div>
        <button class="danger" onclick="clearAllData()" style="width: 100%;">🗑️ 全データ削除</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const categoryLabels = {
      'cash': '現金',
      'nisa-tsumitate': 'NISA（つみたて）',
      'nisa-growth': 'NISA（成長）',
      'stock': '個別株',
      'ideco': 'iDeCo'
    };

    const riskMapping = {
      'cash': 'cash',
      'nisa-tsumitate': 'diversified',
      'nisa-growth': 'diversified',
      'stock': 'concentrated',
      'ideco': 'diversified'
    };

    let state = {
      items: {
        cash: [],
        'nisa-tsumitate': [],
        'nisa-growth': [],
        stock: [],
        ideco: []
      },
      memo: '',
      history: [],
      goals: { cash: 10, diversified: 80, concentrated: 10 },
      productRiskMap: {},
      currentRecordDate: null
    };

    let assetChart, riskChart, categoryChart;
    let itemCounter = 0;

    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      
      document.getElementById(`tab-${tabName}`).classList.add('active');
      event.target.classList.add('active');
      
      if (tabName === 'history') {
        renderHistory();
        renderCharts();
      } else if (tabName === 'settings') {
        loadGoals();
      }
    }

    function addItem(category) {
      const item = {
        id: ++itemCounter,
        name: '',
        quantity: 0,
        price: 0,
        bookValue: 0
      };
      state.items[category].push(item);
      render();
    }

    function removeItem(category, id) {
      state.items[category] = state.items[category].filter(item => item.id !== id);
      render();
    }

    function updateItem(category, id, field, value) {
      const item = state.items[category].find(i => i.id === id);
      if (!item) return;
      
      if (field === 'name') {
        item[field] = value;
      } else {
        item[field] = parseFloat(value) || 0;
      }
      
      render();
    }

    function calculateTotals() {
      let totalAssets = 0;
      let totalPL = 0;
      let totalBookValue = 0;
      
      Object.values(state.items).forEach(items => {
        items.forEach(item => {
          const value = item.quantity * item.price;
          totalAssets += value;
          totalPL += value - item.bookValue;
          totalBookValue += item.bookValue;
        });
      });
      
      return { totalAssets, totalPL, totalBookValue };
    }

    function calculateBreakdown() {
      const breakdown = { cash: 0, diversified: 0, concentrated: 0 };
      const categoryBreakdown = { cash: 0, 'nisa-tsumitate': 0, 'nisa-growth': 0, stock: 0, ideco: 0 };
      
      Object.entries(state.items).forEach(([category, items]) => {
        const categoryTotal = items.reduce((sum, item) => sum + (item.quantity * item.price), 0);
        categoryBreakdown[category] = categoryTotal;
        
        const risk = riskMapping[category];
        breakdown[risk] += categoryTotal;
      });
      
      return { breakdown, categoryBreakdown };
    }

    function render() {
      const { totalAssets, totalPL, totalBookValue } = calculateTotals();
      
      document.getElementById('total-assets').textContent = '¥' + totalAssets.toLocaleString();
      document.getElementById('total-pl').textContent = (totalPL >= 0 ? '+' : '') + '¥' + totalPL.toLocaleString();
      document.getElementById('total-pl').style.color = totalPL >= 0 ? 'var(--color-text-success)' : 'var(--color-text-danger)';
      
      const plPct = totalBookValue > 0 ? ((totalPL / totalBookValue) * 100).toFixed(2) : 0;
      document.getElementById('total-pl-pct').textContent = (totalPL >= 0 ? '+' : '') + plPct + '%';
      
      Object.keys(state.items).forEach(category => {
        const container = document.getElementById(`items-${category}`);
        container.innerHTML = '';
        
        state.items[category].forEach(item => {
          const value = item.quantity * item.price;
          const pl = value - item.bookValue;
          
          const div = document.createElement('div');
          div.className = 'item-card';
          div.innerHTML = `
            <div class="item-header">
              <input type="text" value="${item.name}" placeholder="商品名" 
                onchange="updateItem('${category}', ${item.id}, 'name', this.value)"
                style="flex: 1; margin-right: 8px;">
              <button class="danger item-remove" onclick="removeItem('${category}', ${item.id})">削除</button>
            </div>
            <div class="input-row">
              <label>数量</label>
              <input type="number" value="${item.quantity}" step="0.01"
                onchange="updateItem('${category}', ${item.id}, 'quantity', this.value)">
            </div>
            <div class="input-row">
              <label>単価</label>
              <input type="number" value="${item.price}" step="0.01"
                onchange="updateItem('${category}', ${item.id}, 'price', this.value)">
            </div>
            <div class="input-row">
              <label>簿価</label>
              <input type="number" value="${item.bookValue}" step="0.01"
                onchange="updateItem('${category}', ${item.id}, 'bookValue', this.value)">
            </div>
            <div style="margin-top: 8px; font-size: 13px; color: var(--color-text-secondary);">
              評価額: ¥${value.toLocaleString()} | 損益: ${pl >= 0 ? '+' : ''}¥${pl.toLocaleString()}
            </div>
          `;
          container.appendChild(div);
        });
      });
      
      document.getElementById('memo-input').value = state.memo;
    }

    function saveState() {
      localStorage.setItem('portfolio-state', JSON.stringify(state));
    }

    function loadState() {
      const saved = localStorage.getItem('portfolio-state');
      if (saved) {
        state = JSON.parse(saved);
        itemCounter = Math.max(0, ...Object.values(state.items).flatMap(items => items.map(i => i.id)));
      }
      render();
    }

    function setDefaultRecordDate() {
      const now = new Date();
      state.currentRecordDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      document.getElementById('record-year').value = now.getFullYear();
      document.getElementById('record-month').value = now.getMonth() + 1;
    }

    function loadFromLatestHistory() {
      if (state.history.length > 0) {
        const latest = state.history[state.history.length - 1];
        state.items = JSON.parse(JSON.stringify(latest.items));
        state.memo = '';
        
        const now = new Date();
        state.currentRecordDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        document.getElementById('record-year').value = now.getFullYear();
        document.getElementById('record-month').value = now.getMonth() + 1;
        
        render();
      } else {
        setDefaultRecordDate();
      }
    }

    function saveSnapshot() {
      const year = parseInt(document.getElementById('record-year').value);
      const month = parseInt(document.getElementById('record-month').value);
      
      if (!year || !month || month < 1 || month > 12) {
        alert('⚠️ 正しい年月を入力してください');
        return;
      }
      
      const recordDate = `${year}-${String(month).padStart(2, '0')}`;
      
      const existingIndex = state.history.findIndex(h => h.date === recordDate);
      if (existingIndex !== -1) {
        if (!confirm(`${year}年${month}月のデータは既に存在します。上書きしますか?`)) {
          return;
        }
      }
      
      const { totalAssets, totalPL, totalBookValue } = calculateTotals();
      const { breakdown, categoryBreakdown } = calculateBreakdown();
      
      state.memo = document.getElementById('memo-input').value;
      
      const snapshot = {
        date: recordDate,
        items: JSON.parse(JSON.stringify(state.items)),
        total: totalAssets,
        pl: totalPL,
        bookValue: totalBookValue,
        breakdown,
        categoryBreakdown,
        memo: state.memo
      };
      
      if (existingIndex !== -1) {
        state.history[existingIndex] = snapshot;
      } else {
        state.history.push(snapshot);
      }
      
      state.history.sort((a, b) => a.date.localeCompare(b.date));
      
      saveState();
      alert(`✅ ${year}年${month}月のデータを保存しました`);
      
      switchTab('history');
      document.querySelectorAll('.tab-btn')[1].classList.add('active');
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      list.innerHTML = '';
      
      document.getElementById('record-count').textContent = state.history.length + '回';
      
      if (state.history.length === 0) {
        list.innerHTML = '<div style="text-align: center; color: var(--color-text-secondary); padding: 2rem;">まだ記録がありません</div>';
        return;
      }
      
      state.history.slice().reverse().forEach((snapshot, reverseIndex) => {
        const index = state.history.length - 1 - reverseIndex;
        const date = new Date(snapshot.date);
        const dateStr = `${date.getFullYear()}年${date.getMonth() + 1}月`;
        
        const div = document.createElement('div');
        div.className = 'history-item';
        div.onclick = () => loadSnapshot(index);
        div.innerHTML = `
          <div class="history-date">${dateStr}</div>
          <div class="history-total">総資産: ¥${snapshot.total.toLocaleString()}</div>
          ${snapshot.memo ? `<div style="font-size: 13px; color: var(--color-text-tertiary); margin-top: 4px;">${snapshot.memo}</div>` : ''}
        `;
        list.appendChild(div);
      });
      
      if (state.history.length >= 2) {
        const latest = state.history[state.history.length - 1];
        const previous = state.history[state.history.length - 2];
        const change = latest.total - previous.total;
        const changePct = ((change / previous.total) * 100).toFixed(2);
        
        document.getElementById('mom-change').textContent = (change >= 0 ? '+' : '') + '¥' + change.toLocaleString();
        document.getElementById('mom-pct').textContent = (change >= 0 ? '+' : '') + changePct + '%';
        document.getElementById('mom-change').style.color = change >= 0 ? 'var(--color-text-success)' : 'var(--color-text-danger)';
      } else {
        document.getElementById('mom-change').textContent = '-';
        document.getElementById('mom-pct').textContent = '-';
      }
    }

    function loadSnapshot(index) {
      const snapshot = state.history[index];
      state.items = JSON.parse(JSON.stringify(snapshot.items));
      state.memo = snapshot.memo;
      
      const date = new Date(snapshot.date);
      state.currentRecordDate = snapshot.date;
      document.getElementById('record-year').value = date.getFullYear();
      document.getElementById('record-month').value = date.getMonth() + 1;
      
      switchTab('current');
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
      render();
    }

    function renderCharts() {
      if (state.history.length === 0) return;
      
      const labels = state.history.map(s => {
        const d = new Date(s.date);
        return (d.getMonth() + 1) + '月';
      });
      
      const cashData = state.history.map(s => s.breakdown.cash);
      const diversifiedData = state.history.map(s => s.breakdown.diversified);
      const concentratedData = state.history.map(s => s.breakdown.concentrated);
      
      const totals = state.history.map(s => s.breakdown.cash + s.breakdown.diversified + s.breakdown.concentrated);
      
      if (riskChart) riskChart.destroy();
      riskChart = new Chart(document.getElementById('risk-chart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: '現金', data: cashData, backgroundColor: '#97C459', stack: 'stack' },
            { label: '分散投資', data: diversifiedData, backgroundColor: '#85B7EB', stack: 'stack' },
            { label: '集中投資', data: concentratedData, backgroundColor: '#FAC775', stack: 'stack' }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { 
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const value = context.parsed.y;
                  const total = totals[context.dataIndex];
                  const percentage = ((value / total) * 100).toFixed(1);
                  return context.dataset.label + ': ¥' + value.toLocaleString() + ' (' + percentage + '%)';
                }
              }
            }
          },
          scales: {
            x: { stacked: true },
            y: { 
              stacked: true, 
              ticks: { 
                callback: v => Math.round(v / 10000) + '万'
              } 
            }
          }
        }
      });
      
      const totalData = state.history.map(s => s.total);
      
      if (assetChart) assetChart.destroy();
      assetChart = new Chart(document.getElementById('asset-chart'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: '総資産', data: totalData, borderColor: '#378ADD', backgroundColor: 'rgba(55, 138, 221, 0.1)', fill: true, tension: 0.3 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { ticks: { callback: v => Math.round(v / 10000) + '万' } }
          }
        }
      });
      
      if (state.history.length > 0) {
        const latest = state.history[state.history.length - 1];
        const categoryBreakdown = latest.categoryBreakdown;
        
        const categoryColors = {
          'cash': '#97C459',
          'nisa-tsumitate': '#85B7EB',
          'nisa-growth': '#378ADD',
          'stock': '#FAC775',
          'ideco': '#AFA9EC'
        };
        
        const categoryData = [];
        const categoryLabelsList = [];
        const categoryColorsList = [];
        
        Object.entries(categoryBreakdown).forEach(([category, amount]) => {
          if (amount > 0) {
            categoryData.push(amount);
            categoryLabelsList.push(categoryLabels[category]);
            categoryColorsList.push(categoryColors[category]);
          }
        });
        
        const categoryTotal = categoryData.reduce((sum, val) => sum + val, 0);
        
        if (categoryChart) categoryChart.destroy();
        categoryChart = new Chart(document.getElementById('category-chart'), {
          type: 'pie',
          data: {
            labels: categoryLabelsList,
            datasets: [{
              data: categoryData,
              backgroundColor: categoryColorsList
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function(context) {
                    const value = context.parsed;
                    const percentage = ((value / categoryTotal) * 100).toFixed(1);
                    const date = new Date(latest.date);
                    const dateStr = (date.getMonth() + 1) + '月';
                    return dateStr + ' ' + context.label + ': ¥' + value.toLocaleString() + ' (' + percentage + '%)';
                  }
                }
              }
            }
          }
        });
      }
    }

    function loadGoals() {
      document.getElementById('goal-cash').value = state.goals.cash;
      document.getElementById('goal-diversified').value = state.goals.diversified;
      document.getElementById('goal-concentrated').value = state.goals.concentrated;
    }

    function saveGoals() {
      state.goals.cash = parseInt(document.getElementById('goal-cash').value) || 0;
      state.goals.diversified = parseInt(document.getElementById('goal-diversified').value) || 0;
      state.goals.concentrated = parseInt(document.getElementById('goal-concentrated').value) || 0;
      
      const total = state.goals.cash + state.goals.diversified + state.goals.concentrated;
      if (total !== 100) {
        alert('⚠️ 合計が100%になるように設定してください（現在: ' + total + '%）');
        return;
      }
      
      saveState();
      alert('✅ 目標比率を保存しました');
    }

    function clearAllData() {
      if (!confirm('本当に全データを削除しますか?この操作は取り消せません。')) return;
      
      state.items = {
        cash: [],
        'nisa-tsumitate': [],
        'nisa-growth': [],
        stock: [],
        ideco: []
      };
      state.memo = '';
      state.history = [];
      state.productRiskMap = {};
      state.currentRecordDate = null;
      
      saveState();
      setDefaultRecordDate();
      render();
      alert('✅ 全データを削除しました');
      switchTab('current');
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
    }

    // 初期化
    loadState();
    loadFromLatestHistory();
    
    // スタンドアローンモード検出とデバッグ情報
    if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) {
      console.log('スタンドアローンモードで起動しています');
    }
  </script>
</body>
</html>
