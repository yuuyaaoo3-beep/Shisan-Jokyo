<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="投資管理">
  <title>投資ポートフォリオ管理</title>
  <link rel="apple-touch-icon" href="app-icon.png">
  <link rel="icon" type="image/png" href="app-icon.png">
  <style>
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f7f6f3;
      --color-background-tertiary: #f1efe8;
      --color-background-info: #e6f1fb;
      --color-background-danger: #fcebeb;
      --color-background-success: #eaf3de;
      --color-background-warning: #faeeda;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666666;
      --color-text-tertiary: #999999;
      --color-text-info: #185fa5;
      --color-text-danger: #a32d2d;
      --color-text-success: #3b6d11;
      --color-text-warning: #854f0b;
      --color-border-tertiary: rgba(0, 0, 0, 0.15);
      --color-border-secondary: rgba(0, 0, 0, 0.3);
      --color-border-primary: rgba(0, 0, 0, 0.4);
      --color-border-info: #b5d4f4;
      --color-border-danger: #f7c1c1;
      --color-border-success: #c0dd97;
      --color-border-warning: #fac775;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --border-radius-xl: 16px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1a1a1a;
        --color-background-secondary: #2a2a2a;
        --color-background-tertiary: #333333;
        --color-background-info: #0c447c;
        --color-background-danger: #791f1f;
        --color-background-success: #27500a;
        --color-background-warning: #633806;
        --color-text-primary: #ffffff;
        --color-text-secondary: #b3b3b3;
        --color-text-tertiary: #808080;
        --color-text-info: #b5d4f4;
        --color-text-danger: #f7c1c1;
        --color-text-success: #c0dd97;
        --color-text-warning: #fac775;
        --color-border-tertiary: rgba(255, 255, 255, 0.15);
        --color-border-secondary: rgba(255, 255, 255, 0.3);
        --color-border-primary: rgba(255, 255, 255, 0.4);
        --color-border-info: #185fa5;
        --color-border-danger: #a32d2d;
        --color-border-success: #3b6d11;
        --color-border-warning: #854f0b;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: var(--font-sans); 
      color: var(--color-text-primary); 
      background: var(--color-background-tertiary);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      max-width: 480px;
      margin: 0 auto;
    }
    .container { padding: 16px; }
    .tab-nav { 
      display: flex; 
      border-bottom: 0.5px solid var(--color-border-tertiary); 
      margin-bottom: 1.5rem; 
      background: var(--color-background-primary);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .tab-btn { 
      flex: 1; 
      padding: 12px; 
      background: none; 
      border: none; 
      font-size: 14px; 
      font-weight: 500; 
      color: var(--color-text-secondary); 
      cursor: pointer; 
      border-bottom: 2px solid transparent; 
      transition: all 0.2s; 
    }
    .tab-btn.active { color: var(--color-text-primary); border-bottom-color: var(--color-text-info); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .section { margin-bottom: 1.5rem; }
    .section-title { font-size: 16px; font-weight: 500; margin-bottom: 12px; }
    .card { 
      background: var(--color-background-primary); 
      border: 0.5px solid var(--color-border-tertiary); 
      border-radius: var(--border-radius-lg); 
      padding: 1rem; 
      margin-bottom: 12px; 
    }
    .metric-card { 
      background: var(--color-background-secondary); 
      border-radius: var(--border-radius-md); 
      padding: 1rem; 
    }
    .metric-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px; }
    .metric-value { font-size: 24px; font-weight: 500; }
    .metric-sub { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .input-row label { flex: 1; font-size: 14px; color: var(--color-text-secondary); }
    .input-row input, .input-row select { width: 140px; }
    input[type="text"], input[type="number"], select, textarea { 
      font-size: 14px; 
      padding: 8px 12px; 
      border: 0.5px solid var(--color-border-tertiary); 
      border-radius: var(--border-radius-md); 
      background: var(--color-background-primary); 
      color: var(--color-text-primary); 
    }
    textarea { width: 100%; min-height: 80px; resize: vertical; font-family: var(--font-sans); }
    button { 
      padding: 10px 16px; 
      border: 0.5px solid var(--color-border-secondary); 
      border-radius: var(--border-radius-md); 
      background: transparent; 
      color: var(--color-text-primary); 
      font-size: 14px; 
      font-weight: 500; 
      cursor: pointer; 
      transition: all 0.2s; 
    }
    button:hover { background: var(--color-background-secondary); }
    button:active { transform: scale(0.98); }
    button.primary { 
      background: var(--color-background-info); 
      color: var(--color-text-info); 
      border-color: var(--color-border-info); 
    }
    button.danger { 
      background: var(--color-background-danger); 
      color: var(--color-text-danger); 
      border-color: var(--color-border-danger); 
    }
    .item-card { 
      background: var(--color-background-primary); 
      border: 0.5px solid var(--color-border-tertiary); 
      border-radius: var(--border-radius-md); 
      padding: 12px; 
      margin-bottom: 8px; 
    }
    .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .item-name { font-weight: 500; font-size: 14px; }
    .item-remove { padding: 4px 8px; font-size: 12px; }
    .history-item { 
      border-left: 2px solid var(--color-border-info); 
      padding-left: 12px; 
      margin-bottom: 16px; 
      cursor: pointer; 
      transition: all 0.2s; 
    }
    .history-item:hover { border-left-color: var(--color-text-info); }
    .history-date { font-weight: 500; font-size: 14px; margin-bottom: 4px; }
    .history-total { font-size: 13px; color: var(--color-text-secondary); }
    .chart-container { position: relative; width: 100%; height: 260px; margin-top: 16px; }
    .goal-input { width: 60px !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('current')">現在</button>
      <button class="tab-btn" onclick="switchTab('history')">履歴</button>
      <button class="tab-btn" onclick="switchTab('settings')">設定</button>
    </div>

    <div id="tab-current" class="tab-content active">
      <div class="section">
        <div class="grid-2">
          <div class="metric-card">
            <div class="metric-label">総資産</div>
            <div class="metric-value" id="total-assets">¥0</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">評価損益</div>
            <div class="metric-value" id="total-pl">¥0</div>
            <div class="metric-sub" id="total-pl-pct">0%</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">保有資産</div>
        
        <div class="card">
          <div style="font-weight: 500; margin-bottom: 12px; font-size: 14px;">現金</div>
          <div id="cash-list"></div>
          <button onclick="addItem('cash')" style="width: 100%; margin-top: 8px;">+ 口座を追加</button>
        </div>

        <div class="card">
          <div style="font-weight: 500; margin-bottom: 12px; font-size: 14px;">NISA（積立枠）</div>
          <div id="nisa-tsumitate-list"></div>
          <button onclick="addItem('nisa-tsumitate')" style="width: 100%; margin-top: 8px;">+ 商品を追加</button>
        </div>

        <div class="card">
          <div style="font-weight: 500; margin-bottom: 12px; font-size: 14px;">NISA（成長投資枠）</div>
          <div id="nisa-growth-list"></div>
          <button onclick="addItem('nisa-growth')" style="width: 100%; margin-top: 8px;">+ 商品を追加</button>
        </div>

        <div class="card">
          <div style="font-weight: 500; margin-bottom: 12px; font-size: 14px;">個別株</div>
          <div id="stock-list"></div>
          <button onclick="addItem('stock')" style="width: 100%; margin-top: 8px;">+ 銘柄を追加</button>
        </div>

        <div class="card">
          <div style="font-weight: 500; margin-bottom: 12px; font-size: 14px;">iDeCo</div>
          <div id="ideco-list"></div>
          <button onclick="addItem('ideco')" style="width: 100%; margin-top: 8px;">+ 商品を追加</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">メモ</div>
        <textarea id="memo-input" placeholder="今月の投資方針や気づきを記録..."></textarea>
      </div>

      <button class="primary" onclick="saveSnapshot()" style="width: 100%; padding: 14px; font-size: 15px;">📊 今月のデータを記録</button>
    </div>

    <div id="tab-history" class="tab-content">
      <div class="section">
        <div class="section-title">リスク度推移</div>
        <div class="chart-container">
          <canvas id="risk-chart" role="img" aria-label="月別リスク度推移"></canvas>
        </div>
      </div>

      <div class="section">
        <div class="section-title">総資産推移</div>
        <div class="chart-container">
          <canvas id="asset-chart" role="img" aria-label="月別総資産推移"></canvas>
        </div>
      </div>

      <div class="section">
        <div class="section-title">前月比</div>
        <div class="grid-2">
          <div class="metric-card">
            <div class="metric-label">資産増減</div>
            <div class="metric-value" id="mom-change">-</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">増減率</div>
            <div class="metric-value" id="mom-pct">-</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">記録履歴</div>
        <div id="history-list"></div>
      </div>
    </div>

    <div id="tab-settings" class="tab-content">
      <div class="section">
        <div class="section-title">目標比率</div>
        <div class="card">
          <div class="input-row">
            <label>現金</label>
            <input type="number" id="goal-cash" class="goal-input" min="0" max="100" value="20">
            <span style="font-size: 14px;">%</span>
          </div>
          <div class="input-row">
            <label>分散投資</label>
            <input type="number" id="goal-diversified" class="goal-input" min="0" max="100" value="60">
            <span style="font-size: 14px;">%</span>
          </div>
          <div class="input-row">
            <label>集中投資</label>
            <input type="number" id="goal-concentrated" class="goal-input" min="0" max="100" value="20">
            <span style="font-size: 14px;">%</span>
          </div>
          <button onclick="saveGoals()" style="width: 100%; margin-top: 12px;">保存</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">データ管理</div>
        <div class="card">
          <button onclick="clearAllData()" class="danger" style="width: 100%;">全データを削除</button>
          <div style="font-size: 12px; color: var(--color-text-secondary); margin-top: 8px;">※この操作は取り消せません</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>
    const state = {
      items: {
        cash: [],
        'nisa-tsumitate': [],
        'nisa-growth': [],
        stock: [],
        ideco: []
      },
      memo: '',
      goals: { cash: 20, diversified: 60, concentrated: 20 },
      history: [],
      productRiskMap: {}
    };

    let riskChart, assetChart;

    function loadState() {
      try {
        const saved = localStorage.getItem('investment-state');
        if (saved) {
          const data = JSON.parse(saved);
          Object.assign(state, data);
        }
      } catch (e) {
        console.log('No saved state');
      }
      render();
      loadGoals();
    }

    function saveState() {
      try {
        localStorage.setItem('investment-state', JSON.stringify(state));
      } catch (e) {
        console.error('Save failed', e);
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
      
      if (tab === 'history') {
        renderHistory();
        renderCharts();
      }
    }

    function addItem(category) {
      const id = Date.now().toString();
      const item = {
        id,
        name: '',
        amount: 0,
        pl: 0,
        risk: category === 'cash' ? 'cash' : 'diversified'
      };
      state.items[category].push(item);
      render();
    }

    function removeItem(category, id) {
      state.items[category] = state.items[category].filter(i => i.id !== id);
      render();
      saveState();
    }

    function updateItem(category, id, field, value) {
      const item = state.items[category].find(i => i.id === id);
      if (item) {
        if (field === 'name' && value && category !== 'cash') {
          if (!state.productRiskMap[value]) {
            state.productRiskMap[value] = item.risk || 'diversified';
          } else {
            item.risk = state.productRiskMap[value];
          }
        }
        if (field === 'risk' && item.name) {
          state.productRiskMap[item.name] = value;
        }
        item[field] = field === 'amount' || field === 'pl' ? parseFloat(value) || 0 : value;
        render();
        saveState();
      }
    }

    function renderItemList(category, container) {
      const list = document.getElementById(container);
      list.innerHTML = '';
      
      state.items[category].forEach(item => {
        const div = document.createElement('div');
        div.className = 'item-card';
        
        const nameLabel = category === 'cash' ? '口座名' : '商品名';
        const amountLabel = '保有額';
        const plLabel = '損益額';
        
        div.innerHTML = `
          <div class="item-header">
            <input type="text" value="${item.name}" placeholder="${nameLabel}" 
              onchange="updateItem('${category}', '${item.id}', 'name', this.value)"
              style="flex: 1; margin-right: 8px;">
            <button class="item-remove danger" onclick="removeItem('${category}', '${item.id}')">削除</button>
          </div>
          <div class="input-row">
            <label>${amountLabel}</label>
            <input type="number" value="${item.amount}" 
              onchange="updateItem('${category}', '${item.id}', 'amount', this.value)">
          </div>
          ${category !== 'cash' ? `
            <div class="input-row">
              <label>${plLabel}</label>
              <input type="number" value="${item.pl}" 
                onchange="updateItem('${category}', '${item.id}', 'pl', this.value)">
            </div>
            <div class="input-row">
              <label>リスク度</label>
              <select onchange="updateItem('${category}', '${item.id}', 'risk', this.value)">
                <option value="diversified" ${item.risk === 'diversified' ? 'selected' : ''}>分散投資</option>
                <option value="concentrated" ${item.risk === 'concentrated' ? 'selected' : ''}>集中投資</option>
              </select>
            </div>
          ` : ''}
        `;
        list.appendChild(div);
      });
    }

    function calculateTotals() {
      let total = 0;
      let totalPL = 0;
      let totalInvested = 0;
      
      Object.values(state.items).flat().forEach(item => {
        total += item.amount;
        totalPL += item.pl || 0;
      });
      
      totalInvested = total - totalPL;
      
      return { total, totalPL, totalInvested };
    }

    function calculateRiskBreakdown() {
      const breakdown = { cash: 0, diversified: 0, concentrated: 0 };
      
      Object.entries(state.items).forEach(([category, items]) => {
        items.forEach(item => {
          breakdown[item.risk] += item.amount;
        });
      });
      
      return breakdown;
    }

    function render() {
      renderItemList('cash', 'cash-list');
      renderItemList('nisa-tsumitate', 'nisa-tsumitate-list');
      renderItemList('nisa-growth', 'nisa-growth-list');
      renderItemList('stock', 'stock-list');
      renderItemList('ideco', 'ideco-list');
      
      const { total, totalPL, totalInvested } = calculateTotals();
      const plPct = totalInvested > 0 ? ((totalPL / totalInvested) * 100).toFixed(2) : 0;
      
      document.getElementById('total-assets').textContent = '¥' + total.toLocaleString();
      document.getElementById('total-pl').textContent = (totalPL >= 0 ? '+' : '') + '¥' + totalPL.toLocaleString();
      document.getElementById('total-pl-pct').textContent = (totalPL >= 0 ? '+' : '') + plPct + '%';
      document.getElementById('total-pl').style.color = totalPL >= 0 ? 'var(--color-text-success)' : 'var(--color-text-danger)';
      
      document.getElementById('memo-input').value = state.memo;
    }

    function saveSnapshot() {
      state.memo = document.getElementById('memo-input').value;
      
      const { total, totalPL, totalInvested } = calculateTotals();
      const breakdown = calculateRiskBreakdown();
      
      const snapshot = {
        date: new Date().toISOString(),
        total,
        totalPL,
        totalInvested,
        breakdown,
        items: JSON.parse(JSON.stringify(state.items)),
        memo: state.memo
      };
      
      state.history.push(snapshot);
      saveState();
      
      alert('✅ データを記録しました');
      switchTab('history');
      document.querySelectorAll('.tab-btn')[1].classList.add('active');
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      list.innerHTML = '';
      
      if (state.history.length === 0) {
        list.innerHTML = '<div style="color: var(--color-text-secondary); font-size: 14px; text-align: center; padding: 2rem;">記録がありません</div>';
        return;
      }
      
      const sorted = [...state.history].reverse();
      
      sorted.forEach((snapshot, idx) => {
        const date = new Date(snapshot.date);
        const dateStr = date.getFullYear() + '年' + (date.getMonth() + 1) + '月';
        
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
          <div class="history-date">${dateStr}</div>
          <div class="history-total">総資産: ¥${snapshot.total.toLocaleString()} / 損益: ${(snapshot.totalPL >= 0 ? '+' : '')}¥${snapshot.totalPL.toLocaleString()}</div>
          ${snapshot.memo ? `<div style="font-size: 12px; color: var(--color-text-secondary); margin-top: 4px;">${snapshot.memo}</div>` : ''}
        `;
        div.onclick = () => loadSnapshot(state.history.length - 1 - idx);
        list.appendChild(div);
      });
      
      if (state.history.length >= 2) {
        const latest = state.history[state.history.length - 1];
        const previous = state.history[state.history.length - 2];
        const change = latest.total - previous.total;
        const changePct = ((change / previous.total) * 100).toFixed(2);
        
        document.getElementById('mom-change').textContent = (change >= 0 ? '+' : '') + '¥' + change.toLocaleString();
        document.getElementById('mom-pct').textContent = (change >= 0 ? '+' : '') + changePct + '%';
        document.getElementById('mom-change').style.color = change >= 0 ? 'var(--color-text-success)' : 'var(--color-text-danger)';
      } else {
        document.getElementById('mom-change').textContent = '-';
        document.getElementById('mom-pct').textContent = '-';
      }
    }

    function loadSnapshot(index) {
      const snapshot = state.history[index];
      state.items = JSON.parse(JSON.stringify(snapshot.items));
      state.memo = snapshot.memo;
      switchTab('current');
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
      render();
    }

    function renderCharts() {
      if (state.history.length === 0) return;
      
      const labels = state.history.map(s => {
        const d = new Date(s.date);
        return (d.getMonth() + 1) + '月';
      });
      
      const cashData = state.history.map(s => s.breakdown.cash);
      const diversifiedData = state.history.map(s => s.breakdown.diversified);
      const concentratedData = state.history.map(s => s.breakdown.concentrated);
      
      if (riskChart) riskChart.destroy();
      riskChart = new Chart(document.getElementById('risk-chart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: '現金', data: cashData, backgroundColor: '#97C459', stack: 'stack' },
            { label: '分散投資', data: diversifiedData, backgroundColor: '#85B7EB', stack: 'stack' },
            { label: '集中投資', data: concentratedData, backgroundColor: '#FAC775', stack: 'stack' }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { stacked: true },
            y: { stacked: true, ticks: { callback: v => '¥' + (v / 1000).toFixed(0) + 'K' } }
          }
        }
      });
      
      const totalData = state.history.map(s => s.total);
      
      if (assetChart) assetChart.destroy();
      assetChart = new Chart(document.getElementById('asset-chart'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: '総資産', data: totalData, borderColor: '#378ADD', backgroundColor: 'rgba(55, 138, 221, 0.1)', fill: true, tension: 0.3 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { ticks: { callback: v => '¥' + (v / 1000).toFixed(0) + 'K' } }
          }
        }
      });
    }

    function loadGoals() {
      document.getElementById('goal-cash').value = state.goals.cash;
      document.getElementById('goal-diversified').value = state.goals.diversified;
      document.getElementById('goal-concentrated').value = state.goals.concentrated;
    }

    function saveGoals() {
      state.goals.cash = parseInt(document.getElementById('goal-cash').value) || 0;
      state.goals.diversified = parseInt(document.getElementById('goal-diversified').value) || 0;
      state.goals.concentrated = parseInt(document.getElementById('goal-concentrated').value) || 0;
      
      const total = state.goals.cash + state.goals.diversified + state.goals.concentrated;
      if (total !== 100) {
        alert('⚠️ 合計が100%になるように設定してください（現在: ' + total + '%）');
        return;
      }
      
      saveState();
      alert('✅ 目標比率を保存しました');
    }

    function clearAllData() {
      if (!confirm('本当に全データを削除しますか？この操作は取り消せません。')) return;
      
      state.items = {
        cash: [],
        'nisa-tsumitate': [],
        'nisa-growth': [],
        stock: [],
        ideco: []
      };
      state.memo = '';
      state.history = [];
      state.productRiskMap = {};
      
      saveState();
      render();
      alert('✅ 全データを削除しました');
      switchTab('current');
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
    }

    loadState();
  </script>
</body>
</html>
